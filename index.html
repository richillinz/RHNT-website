<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richnet Network | $RHNT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased bg-[#050505] text-white fade-in">

    <!-- Hero -->
    <section class="max-w-7xl mx-auto px-8 py-32 text-center">
        <img src="assets/RHNT--token-symbol-6c6c655b-88a4-473d-96c4-03f513c2d8a3.png" class="w-20 h-20 mx-auto mb-8 rounded-full border border-cyan-500 shadow-lg shadow-cyan-500/20">
        <h1 class="text-6xl font-extrabold mb-6">The Future of <span class="gradient-text">Richnet Network</span></h1>
        <p class="text-gray-400 text-xl max-w-xl mx-auto mb-10">Empowering the next generation of decentralized finance. Fast, secure, and built for the community.</p>
    </section>

    <!-- Tokenomics -->
    <section class="max-w-6xl mx-auto px-8 py-20">
        <h2 class="text-4xl font-bold text-center mb-16">Tokenomics</h2>
        <div class="grid md:grid-cols-3 gap-8">
            <div class="crypto-card p-10 rounded-2xl text-center"><h3 class="text-gray-400 uppercase text-sm">Total Supply</h3><p class="text-4xl font-bold mt-2">1B</p></div>
            <div class="crypto-card p-10 rounded-2xl text-center"><h3 class="text-gray-400 uppercase text-sm">Tax</h3><p class="text-4xl font-bold mt-2">0%</p></div>
            <div class="crypto-card p-10 rounded-2xl text-center"><h3 class="text-gray-400 uppercase text-sm">Liquidity</h3><p class="text-4xl font-bold mt-2">Locked</p></div>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
